/* ── MINDMAP NODE ── */
function MindNode({node,depth,onUpdate,onDelete,onAdd,isRoot}) {
  const [editing,setEditing]         = useState(false);
  const [editText,setEditText]       = useState(node.text);
  const [addingChild,setAddingChild] = useState(false);
  const [newChild,setNewChild]       = useState("");
  const has = node.children && node.children.length > 0;
  const nc  = depth===0?"#fbbf24":depth===1?"#4d9eff":depth===2?"#00d97e":"#b57bff";
  const fs  = depth===0?15:depth===1?13:12;
  const fw  = depth<=1?600:400;

  const saveEdit=()=>{ if(editText.trim()) onUpdate(node.id,editText.trim()); setEditing(false); };
  const doAdd=()=>{ if(newChild.trim()){onAdd(node.id,newChild.trim());setNewChild("");setAddingChild(false);} };

  return (
    <div style={{marginLeft:isRoot?0:depth>2?14:18}}>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0"}}>
        <button onClick={()=>onUpdate(node.id,node.text,!node.expanded)} style={{background:"transparent",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",flexShrink:0,width:16}}>
          {has?(node.expanded?<ChevronDown size={12} color={nc}/>:<CR size={12} color={nc}/>):<div style={{width:8,height:8,borderRadius:"50%",background:nc,opacity:0.4,marginLeft:4}}/>}
        </button>
        {editing?(
          <input value={editText} onChange={e=>setEditText(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditing(false);}}
            onBlur={saveEdit} autoFocus
            style={{flex:1,background:"rgba(255,255,255,0.06)",border:`1px solid ${nc}50`,borderRadius:6,padding:"3px 8px",color:"#e0e0f0",fontSize:fs,outline:"none"}}/>
        ):(
          <span onDoubleClick={()=>setEditing(true)} style={{flex:1,fontSize:fs,fontWeight:fw,color:depth===0?nc:depth===1?"#e0e0f0":"#a0a0c0",cursor:"default",lineHeight:1.4,userSelect:"none"}}>{node.text}</span>
        )}
        <div style={{display:"flex",gap:3,flexShrink:0}}>
          <button onClick={()=>setAddingChild(true)} style={{background:"transparent",border:"none",cursor:"pointer",padding:2,color:"#303055",transition:"color 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.color=nc} onMouseLeave={e=>e.currentTarget.style.color="#303055"}><Plus size={11}/></button>
          {!isRoot&&<button onClick={()=>onDelete(node.id)} style={{background:"transparent",border:"none",cursor:"pointer",padding:2,color:"#303055",transition:"color 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.color="#ff4d7e"} onMouseLeave={e=>e.currentTarget.style.color="#303055"}><Minus size={11}/></button>}
        </div>
      </div>
      {addingChild&&(
        <div style={{marginLeft:22,display:"flex",gap:6,padding:"4px 0"}}>
          <input value={newChild} onChange={e=>setNewChild(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")doAdd();if(e.key==="Escape")setAddingChild(false);}}
            placeholder="New node..." autoFocus
            style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid ${nc}40`,borderRadius:6,padding:"4px 9px",color:"#e0e0f0",fontSize:12,outline:"none"}}/>
          <button onClick={doAdd} style={{background:nc,border:"none",borderRadius:6,padding:"4px 10px",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer"}}>Add</button>
          <button onClick={()=>setAddingChild(false)} style={{background:"transparent",border:"none",color:"#505070",cursor:"pointer",fontSize:11}}>✕</button>
        </div>
      )}
      {node.expanded&&has&&(
        <div style={{borderLeft:`1px solid ${nc}20`,marginLeft:7}}>
          {node.children.map(c=><MindNode key={c.id} node={c} depth={depth+1} onUpdate={onUpdate} onDelete={onDelete} onAdd={onAdd} isRoot={false}/>)}
        </div>
      )}
    </div>
  );
}

/* ── NOTE CARD ── */
function NoteCard({note,onEdit,onDelete,onTogglePin}) {
  const c = NOTE_COLORS.find(x=>x.id===note.color)||NOTE_COLORS[0];

/* ── NOTE EDITOR ── */

    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(12px)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:3000,padding:isMobile?0:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d0d1e",border:`1px solid ${c.border}`,borderRadius:isMobile?"18px 18px 0 0":16,width:"100%",maxWidth:isMobile?"100%":560,maxHeight:isMobile?"90vh":"80vh",display:"flex",flexDirection:"column",paddingBottom:isMobile?16:0}}>

              <Save size={12}/> Save
            </button>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"none",color:"#505070",cursor:"pointer",width:28,height:28,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}><X size={14}/></button>

          </div>
          <div style={{width:1,height:18,background:"rgba(255,255,255,0.08)"}}/>
          <select value={cat} onChange={e=>setCat(e.target.value)} style={{background:"#111126",border:"1px solid rgba(255,255,255,0.08)",borderRadius:7,padding:"3px 8px",color:"#a0a0c0",fontSize:11,outline:"none",cursor:"pointer"}}>

            style={{background:"transparent",border:"none",outline:"none",fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e0e0f0",width:"100%",padding:0}}/>
          <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="Write your note..."
            style={{flex:1,background:"transparent",border:"none",outline:"none",resize:"none",fontSize:13,color:"#b0b0cc",lineHeight:1.7,width:"100%",minHeight:200,padding:0}}/>
        </div>
      </div>
    </div>
  );

/* ── LOGIN ── */
function LoginScreen({onLogin,isMobile}) {
  const [name,setName]   = useState("");
  const [email,setEmail] = useState("");

    <div style={{minHeight:"100vh",background:"#07070f",display:"flex",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>

      <div style={{position:"absolute",bottom:"-20%",right:"-10%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(181,123,255,0.12) 0%,transparent 65%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:400,position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:38,color:"#fff",letterSpacing:6,marginBottom:4}}>PRASAD</div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:"#303055",letterSpacing:5}}>LIFE OPERATING SYSTEM</div>
          <div style={{width:40,height:2,background:"linear-gradient(90deg,#4d9eff,#b57bff)",borderRadius:2,margin:"14px auto 0"}}/>
        </div>
        <div style={{background:"rgba(12,12,28,0.95)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:20,padding:"28px 24px"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:"#e0e0f0",marginBottom:4}}>{step===1?"Welcome back":"One more step"}</div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:"#383860",letterSpacing:1,marginBottom:22}}>{step===1?"WHAT'S YOUR NAME?":"YOUR EMAIL ADDRESS"}</div>
          <div style={{display:"flex",gap:6,marginBottom:20}}>
            {[1,2].map(s=><div key={s} style={{height:3,flex:1,borderRadius:3,background:s<=step?"#4d9eff":"rgba(255,255,255,0.08)",transition:"background 0.3s"}}/>)}
          </div>
          {step===1?(
            <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&next()} placeholder="e.g. Prasad" autoFocus
              style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 14px",color:"#e0e0f0",fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          ):(
            <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&next()} placeholder="yourname@gmail.com" type="email" autoFocus
              style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 14px",color:"#e0e0f0",fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          )}
          {err&&<div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:"#ff4d7e",marginBottom:8}}>{err}</div>}
          <button onClick={next} style={{width:"100%",background:"linear-gradient(135deg,#4d9eff,#b57bff)",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",color:"#fff",marginTop:4}}>
            {step===1?"Continue →":"Enter Life OS →"}
          </button>
          {step===2&&<button onClick={()=>setStep(1)} style={{width:"100%",background:"transparent",border:"none",color:"#404060",cursor:"pointer",fontSize:12,marginTop:10}}>← Back</button>}
          <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#1e1e35",textAlign:"center",marginTop:16,marginBottom:0,lineHeight:1.6}}>
            Data stored locally on this device only.<br/>No server. No tracking. Just you.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [user,setUser]               = useState(null);
  const [authLoaded,setAuthLoaded]   = useState(false);
  const [isMobile,setIsMobile]       = useState(false);
  const [sidebarOpen,setSidebarOpen] = useState(true);
  const [activeSection,setActiveSection] = useState("tasks");
  const [tasks,setTasks]             = useState(DEFAULT_TASKS);
  const [activePillar,setActivePillar]   = useState("physical");
  const [showTaskModal,setShowTaskModal] = useState(false);
  const [newTask,setNewTask]         = useState({text:"",pillar:"physical",quadrant:"do"});
  const [notes,setNotes]             = useState(DEFAULT_NOTES);
  const [noteFilter,setNoteFilter]   = useState("All");
  const [noteSearch,setNoteSearch]   = useState("");
  const [editingNote,setEditingNote] = useState(null);
  const [showNoteEditor,setShowNoteEditor] = useState(false);
  const [mindmap,setMindmap]         = useState(DEFAULT_MINDMAP);
  const [today,setToday]             = useState("");

  useEffect(()=>{
    const d=new Date();
    setToday(d.toLocaleDateString("en-IN",{weekday:"short",month:"short",day:"numeric"}));
    const check=()=>{ const m=window.innerWidth<700; setIsMobile(m); if(m) setSidebarOpen(false); };
    check(); window.addEventListener("resize",check);
    const data=load();
    if(data){
      if(data.user)    setUser(data.user);
      if(data.tasks)   setTasks(data.tasks);
      if(data.notes)   setNotes(data.notes);
      if(data.mindmap) setMindmap(data.mindmap);
    }
    setAuthLoaded(true);
    return ()=>window.removeEventListener("resize",check);
  },[]);

  const persist=useCallback((patch)=>{
    const next={user,tasks,notes,mindmap,...patch};
    save(next);
  },[user,tasks,notes,mindmap]);

  const handleLogin=(u)=>{ setUser(u); save({user:u,tasks,notes,mindmap}); };
  const handleLogout=()=>{ setUser(null); save({user:null,tasks,notes,mindmap}); };

  const addTask=()=>{
    if(!newTask.text.trim())return;
    const u={...tasks,[newTask.pillar]:{...tasks[newTask.pillar],[newTask.quadrant]:[...tasks[newTask.pillar][newTask.quadrant],{id:Date.now(),text:newTask.text.trim(),done:false}]}};
    setTasks(u); persist({tasks:u}); setNewTask({text:"",pillar:activePillar,quadrant:"do"}); setShowTaskModal(false);
  };
  const toggleTask=(pl,q,id)=>{ const u={...tasks,[pl]:{...tasks[pl],[q]:tasks[pl][q].map(t=>t.id===id?{...t,done:!t.done}:t)}}; setTasks(u); persist({tasks:u}); };
  const removeTask=(pl,q,id)=>{ const u={...tasks,[pl]:{...tasks[pl],[q]:tasks[pl][q].filter(t=>t.id!==id)}}; setTasks(u); persist({tasks:u}); };

  const saveNote=(data)=>{
    let u;
    if(editingNote&&editingNote!=="new") u=notes.map(n=>n.id===editingNote.id?{...n,...data}:n);
    else u=[{id:Date.now(),pinned:false,createdAt:Date.now(),...data},...notes];
    setNotes(u); persist({notes:u}); setShowNoteEditor(false); setEditingNote(null);
  };
  const deleteNote=(id)=>{ const u=notes.filter(n=>n.id!==id); setNotes(u); persist({notes:u}); };
  const togglePin=(id)=>{ const u=notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n); setNotes(u); persist({notes:u}); };

  const updateNode=(id,text,expanded)=>{
    const walk=n=>n.id===id?{...n,text,expanded:expanded!==undefined?expanded:n.expanded}:{...n,children:n.children?n.children.map(walk):[]};
    const u=walk(mindmap); setMindmap(u); persist({mindmap:u});
  };
  const deleteNode=(id)=>{
    const walk=n=>({...n,children:n.children?n.children.filter(c=>c.id!==id).map(walk):[]});
    const u=walk(mindmap); setMindmap(u); persist({mindmap:u});
  };
  const addNode=(pid,text)=>{
    const nn={id:`n${Date.now()}`,text,expanded:true,children:[]};
    const walk=n=>n.id===pid?{...n,expanded:true,children:[...(n.children||[]),nn]}:{...n,children:n.children?n.children.map(walk):[]};
    const u=walk(mindmap); setMindmap(u); persist({mindmap:u});
  };

  const allTasks=Object.values(tasks).flatMap(p=>Object.values(p).flat());
  const done=allTasks.filter(t=>t.done).length;
  const pct=allTasks.length?Math.round((done/allTasks.length)*100):0;
  const pillar=PILLARS.find(p=>p.id===activePillar);

  const selPillar=(id)=>{ setActivePillar(id); if(isMobile) setSidebarOpen(false); };
  const selSection=(s)=>{ setActiveSection(s); if(isMobile) setSidebarOpen(false); };

  const filtered=notes
    .filter(n=>noteFilter==="All"||n.category===noteFilter)
    .filter(n=>!noteSearch||n.title.toLowerCase().includes(noteSearch.toLowerCase())||n.content.toLowerCase().includes(noteSearch.toLowerCase()))
    .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.createdAt-a.createdAt);

  const sectionColor=activeSection==="tasks"?pillar.color:activeSection==="notes"?"#00d97e":"#b57bff";
  const sectionGlow =activeSection==="tasks"?pillar.glow:activeSection==="notes"?"rgba(0,217,126,0.2)":"rgba(181,123,255,0.2)";

  if(!authLoaded) return <div style={{background:"#07070f",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#4d9eff",fontFamily:"monospace",fontSize:12,letterSpacing:3}}>LOADING...</div>;
  if(!user) return <LoginScreen onLogin={handleLogin} isMobile={isMobile}/>;

  /* Quadrant card */
  const QCard=({q})=>{
    const qt=tasks[activePillar][q.id], qd=qt.filter(t=>t.done).length;
    return (
      <div style={{background:q.bg,border:`1px solid ${q.border}`,borderRadius:14,display:"flex",flexDirection:"column",overflow:isMobile?"visible":"hidden",height:isMobile?"auto":"100%"}}>
        <div style={{padding:"11px 13px 8px",borderBottom:`1px solid ${q.border}`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:q.color}}>{q.name}</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#383860",marginTop:1}}>{q.label}</div>
            </div>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,padding:"2px 8px",borderRadius:20,border:`1px solid ${q.color}40`,color:q.color,fontWeight:700}}>{qd}/{qt.length}</div>
          </div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#252545",marginTop:3}}>{q.hint}</div>
        </div>
        <div style={{flex:isMobile?"none":1,overflowY:isMobile?"visible":"auto",padding:"8px 10px",display:"flex",flexDirection:"column",gap:5}}>
          {qt.length===0&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 0",gap:4,color:"#1e1e35",fontFamily:"'IBM Plex Mono',monospace",fontSize:9,textAlign:"center"}}><span style={{fontSize:14}}>✦</span><span>Tap + to add a task</span></div>}
          {qt.map(task=>(
            <div key={task.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)",opacity:task.done?0.42:1,transition:"opacity 0.2s"}}>
              <button onClick={()=>toggleTask(activePillar,q.id,task.id)} style={{width:19,height:19,borderRadius:5,border:`1.5px solid ${q.color}`,background:task.done?q.color:"transparent",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,transition:"all 0.2s"}}>
                {task.done&&<Check size={10} color="#000" strokeWidth={3}/>}
              </button>
              <span style={{flex:1,fontSize:13,lineHeight:1.55,color:"#c0c0d8",textDecoration:task.done?"line-through":"none",wordBreak:"break-word"}}>{task.text}</span>
              <button onClick={()=>removeTask(activePillar,q.id,task.id)} style={{background:"transparent",border:"none",color:"#1e1e35",cursor:"pointer",padding:2,borderRadius:4,flexShrink:0,marginTop:2,transition:"color 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.color="#ff4d7e"} onMouseLeave={e=>e.currentTarget.style.color="#1e1e35"}><X size={12}/></button>
            </div>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div style={{display:"flex",height:"100vh",background:"#07070f",color:"#dde0f0",fontFamily:"'Outfit',sans-serif",overflow:"hidden",position:"relative"}}>

      {/* Glow */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
        <div style={{position:"absolute",top:"-20%",left:"-10%",width:500,height:500,borderRadius:"50%",background:`radial-gradient(circle,${sectionGlow} 0%,transparent 65%)`,transition:"background 0.7s"}}/>
        <div style={{position:"absolute",bottom:"-20%",right:"5%",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(251,191,36,0.06) 0%,transparent 65%)"}}/>
      </div>

      {/* Mobile backdrop */}
      {isMobile&&sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:19,backdropFilter:"blur(4px)"}}/>}

      {/* SIDEBAR */}
      <aside style={{width:isMobile?(sidebarOpen?"82vw":0):(sidebarOpen?240:0),flexShrink:0,background:"rgba(9,9,19,0.98)",borderRight:sidebarOpen?"1px solid rgba(255,255,255,0.06)":"none",display:"flex",flexDirection:"column",zIndex:isMobile?20:10,backdropFilter:"blur(24px)",overflow:"hidden",transition:"width 0.3s cubic-bezier(0.4,0,0.2,1)",position:isMobile?"fixed":"relative",top:0,left:0,height:"100vh",boxShadow:(isMobile&&sidebarOpen)?"6px 0 40px rgba(0,0,0,0.7)":"none"}}>
        <div style={{width:isMobile?"82vw":240,height:"100%",display:"flex",flexDirection:"column",padding:sidebarOpen?"16px 0":0,opacity:sidebarOpen?1:0,transition:"opacity 0.15s",pointerEvents:sidebarOpen?"auto":"none"}}>

          {/* Logo */}
          <div style={{padding:"0 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:"#fff",letterSpacing:3}}>{user.name.toUpperCase()}</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#252548",letterSpacing:3,marginTop:2}}>LIFE OPERATING SYSTEM</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#303055",marginTop:5}}>{today}</div>
            </div>
            {isMobile&&<button onClick={()=>setSidebarOpen(false)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",color:"#8080a0",cursor:"pointer",width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}><ChevronLeft size={14}/></button>}
          </div>

          {/* Progress */}
          <div style={{padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#404060",marginBottom:6}}>
              <span>TASK PROGRESS</span><span style={{color:"#4d9eff"}}>{pct}%</span>
            </div>
            <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#4d9eff,#b57bff)",borderRadius:4,transition:"width 0.6s",boxShadow:"0 0 8px rgba(77,158,255,0.5)"}}/>
            </div>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#252545",marginTop:4}}>{done}/{allTasks.length} done · {notes.length} notes</div>
          </div>

          {/* Section tabs */}
          <div style={{padding:"10px 10px 6px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#252545",letterSpacing:2,marginBottom:6,paddingLeft:4}}>SECTIONS</div>
            {SECTIONS.map(s=>(
              <button key={s.id} onClick={()=>selSection(s.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:9,border:`1px solid ${activeSection===s.id?s.color+"35":"transparent"}`,background:activeSection===s.id?`${s.color}10`:"transparent",cursor:"pointer",width:"100%",textAlign:"left",marginBottom:2,transition:"all 0.2s"}}>
                <s.Icon size={14} color={activeSection===s.id?s.color:"#404065"} strokeWidth={1.5}/>
                <span style={{fontSize:12,fontWeight:600,color:activeSection===s.id?s.color:"#7070a0"}}>{s.label}</span>
              </button>
            ))}
          </div>

          {/* Pillars — only in tasks section */}
          {activeSection==="tasks"&&(
            <nav style={{flex:1,padding:"8px 8px",display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#252545",letterSpacing:2,marginBottom:4,paddingLeft:4}}>LIFE PILLARS</div>
              {PILLARS.map(p=>{
                const isA=activePillar===p.id, pt=Object.values(tasks[p.id]).flat(), pd=pt.filter(t=>t.done).length;
                return (
                  <button key={p.id} onClick={()=>selPillar(p.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:9,border:`1px solid ${isA?p.color+"35":"transparent"}`,background:isA?p.bg:"transparent",cursor:"pointer",textAlign:"left",width:"100%",transition:"all 0.2s"}}>
                    <p.Icon size={14} color={isA?p.color:"#404065"} strokeWidth={1.5} style={{flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:isA?p.color:"#7070a0"}}>{p.name}</div>
                      <div style={{fontSize:7,color:"#252545",marginTop:0.5,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.subtitle}</div>
                    </div>
                    <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,padding:"1px 6px",borderRadius:20,background:isA?p.color:"#14142a",color:isA?"#000":"#404060",fontWeight:700,flexShrink:0}}>{pd}/{pt.length}</div>
                  </button>
                );
              })}
            </nav>
          )}
          {activeSection!=="tasks"&&<div style={{flex:1}}/>}

          {/* User */}
          <div style={{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#4d9eff,#b57bff)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <User size={13} color="#fff"/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:"#c0c0d8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name}</div>
              <div style={{fontSize:8,color:"#303055",fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div>
            </div>
            <button onClick={handleLogout} style={{background:"transparent",border:"none",color:"#303055",cursor:"pointer",padding:4,borderRadius:6,transition:"color 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.color="#ff4d7e"} onMouseLeave={e=>e.currentTarget.style.color="#303055"}><LogOut size={13}/></button>
          </div>
        </div>
      </aside>

      {/* Desktop toggle tab */}
      {!isMobile&&(
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{position:"fixed",left:sidebarOpen?232:0,top:"50%",transform:"translateY(-50%)",width:18,height:48,borderRadius:"0 8px 8px 0",background:"rgba(18,18,36,0.98)",border:"1px solid rgba(255,255,255,0.07)",borderLeft:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",zIndex:30,transition:"left 0.3s cubic-bezier(0.4,0,0.2,1)"}}>
          {sidebarOpen?<ChevronLeft size={11} color="#606080"/>:<ChevronRight size={11} color="#606080"/>}
        </button>
      )}

      {/* MAIN */}
      <main style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1,minWidth:0}}>

        {/* Header */}
        <header style={{padding:isMobile?"11px 12px 9px":"14px 20px 9px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",background:"rgba(7,7,15,0.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,0.04)",position:"sticky",top:0,zIndex:5,flexShrink:0}}>
          {isMobile&&<button onClick={()=>setSidebarOpen(true)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",cursor:"pointer",width:34,height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Menu size={15} color="#a0a0c0"/></button>}

          {activeSection==="tasks"&&(<>
            <div style={{display:"flex",alignItems:"center",gap:9,flex:1,minWidth:0}}>
              <div style={{width:34,height:34,borderRadius:9,background:pillar.bg,border:`1px solid ${pillar.color}30`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 14px ${pillar.glow}`,flexShrink:0}}>
                <pillar.Icon size={16} color={pillar.color} strokeWidth={1.5}/>
              </div>
              <div style={{minWidth:0}}>
                <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:isMobile?17:21,margin:0,color:pillar.color,lineHeight:1.1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{pillar.name} Pillar</h1>
                <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#383860",margin:"2px 0 0",letterSpacing:1}}>{pillar.subtitle.toUpperCase()}</p>
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              {QUADRANTS.map(q=>{const qt=tasks[activePillar][q.id],qd=qt.filter(t=>t.done).length;return(
                <div key={q.id} style={{padding:isMobile?"2px 6px":"3px 9px",borderRadius:6,background:q.bg,border:`1px solid ${q.border}`,display:"flex",flexDirection:"column",alignItems:"center"}}>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:6,color:q.color,fontWeight:700}}>{q.name.slice(0,3)}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:isMobile?9:11,color:"#fff",fontWeight:700}}>{qd}/{qt.length}</span>
                </div>
              );})}
            </div>
          </>)}

          {activeSection==="notes"&&(<>
            <div style={{display:"flex",alignItems:"center",gap:9,flex:1,minWidth:0}}>
              <div style={{width:34,height:34,borderRadius:9,background:"rgba(0,217,126,0.08)",border:"1px solid rgba(0,217,126,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><FileText size={16} color="#00d97e" strokeWidth={1.5}/></div>
              <div><h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:isMobile?17:21,margin:0,color:"#00d97e",lineHeight:1.1}}>Notes</h1>
                <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#383860",margin:"2px 0 0",letterSpacing:1}}>{notes.length} NOTES · {notes.filter(n=>n.pinned).length} PINNED</p>
              </div>
            </div>
            <div style={{position:"relative",flexShrink:0}}>
              <Search size={12} color="#404060" style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}/>
              <input value={noteSearch} onChange={e=>setNoteSearch(e.target.value)} placeholder="Search..."
                style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"6px 10px 6px 27px",color:"#c0c0d8",fontSize:12,outline:"none",width:isMobile?120:160}}/>
            </div>
          </>)}

          {activeSection==="mindmap"&&(
            <div style={{display:"flex",alignItems:"center",gap:9,flex:1,minWidth:0}}>
              <div style={{width:34,height:34,borderRadius:9,background:"rgba(181,123,255,0.08)",border:"1px solid rgba(181,123,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><GitBranch size={16} color="#b57bff" strokeWidth={1.5}/></div>
              <div><h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:isMobile?17:21,margin:0,color:"#b57bff",lineHeight:1.1}}>Mind Map</h1>
                <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:7,color:"#383860",margin:"2px 0 0",letterSpacing:1}}>DOUBLE-CLICK TO EDIT · + ADD CHILD · − DELETE</p>
              </div>
            </div>
          )}
        </header>

        {/* CONTENT */}
        <div style={{flex:1,overflowY:"auto",position:"relative",zIndex:1}}>

          {activeSection==="tasks"&&(
            <div style={{padding:isMobile?"10px 12px 100px":"12px 20px 20px",...(isMobile?{display:"flex",flexDirection:"column",gap:10}:{display:"grid",gridTemplateColumns:"1fr 1fr",gridTemplateRows:"1fr 1fr",gap:12,height:"calc(100%)"})}}>
              {QUADRANTS.map(q=><QCard key={q.id} q={q}/>)}
            </div>
          )}

          {activeSection==="notes"&&(
            <div style={{padding:isMobile?"10px 12px 100px":"12px 20px 80px"}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                {NOTE_CATS.map(c=>(
                  <button key={c} onClick={()=>setNoteFilter(c)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${noteFilter===c?"#00d97e":"rgba(255,255,255,0.08)"}`,background:noteFilter===c?"rgba(0,217,126,0.12)":"transparent",color:noteFilter===c?"#00d97e":"#606080",fontSize:11,cursor:"pointer",fontWeight:noteFilter===c?600:400,transition:"all 0.2s"}}>{c}</button>
                ))}
              </div>
              {filtered.some(n=>n.pinned)&&(<>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#303055",letterSpacing:2,marginBottom:8}}>PINNED</div>
                <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(240px,1fr))",gap:10,marginBottom:16}}>
                  {filtered.filter(n=>n.pinned).map(n=><NoteCard key={n.id} note={n} onEdit={n=>{setEditingNote(n);setShowNoteEditor(true);}} onDelete={deleteNote} onTogglePin={togglePin}/>)}
                </div>
              </>)}
              {filtered.some(n=>!n.pinned)&&(<>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#303055",letterSpacing:2,marginBottom:8}}>NOTES</div>
                <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
                  {filtered.filter(n=>!n.pinned).map(n=><NoteCard key={n.id} note={n} onEdit={n=>{setEditingNote(n);setShowNoteEditor(true);}} onDelete={deleteNote} onTogglePin={togglePin}/>)}
                </div>
              </>)}
              {filtered.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:"#1e1e35",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}><div style={{fontSize:28,marginBottom:10}}>📝</div><div>No notes yet. Tap + to create one.</div></div>}
            </div>
          )}

          {activeSection==="mindmap"&&(
            <div style={{padding:isMobile?"12px 14px 100px":"16px 24px 80px"}}>
              <div style={{background:"rgba(181,123,255,0.04)",border:"1px solid rgba(181,123,255,0.12)",borderRadius:14,padding:"16px 14px",marginBottom:12}}>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#383860",letterSpacing:1,marginBottom:10}}>DOUBLE-CLICK any node to rename · Click + to add child · Click − to delete</div>
                <MindNode node={mindmap} depth={0} onUpdate={updateNode} onDelete={deleteNode} onAdd={addNode} isRoot={true}/>
              </div>
              <button onClick={()=>addNode("root","New Branch")} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",borderRadius:9,border:"1px solid rgba(181,123,255,0.25)",background:"rgba(181,123,255,0.06)",color:"#b57bff",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(181,123,255,0.12)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(181,123,255,0.06)"}>
                <Plus size={13}/> Add Branch
              </button>
            </div>
          )}
        </div>
      </main>

      {/* FAB */}
      <button onClick={()=>{
        if(activeSection==="tasks"){setShowTaskModal(true);setNewTask({text:"",pillar:activePillar,quadrant:"do"});}
        else if(activeSection==="notes"){setEditingNote("new");setShowNoteEditor(true);}
        else addNode("root","New Branch");
      }} style={{position:"fixed",bottom:22,right:22,width:52,height:52,borderRadius:"50%",border:"none",cursor:"pointer",background:sectionColor,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,boxShadow:`0 0 26px ${sectionGlow},0 6px 16px rgba(0,0,0,0.5)`,transition:"all 0.3s"}}
        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
        <Plus size={22} color="#000" strokeWidth={2.5}/>
      </button>

      {/* TASK MODAL */}
      {showTaskModal&&(
        <div onClick={()=>setShowTaskModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",backdropFilter:"blur(12px)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:2000,padding:isMobile?0:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0c0c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:isMobile?"18px 18px 0 0":18,width:"100%",maxWidth:isMobile?"100%":440,paddingBottom:isMobile?20:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
              <div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:"#e0e0f0"}}>Add New Task</div>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#383860",marginTop:2,letterSpacing:1}}>DEFINE YOUR NEXT ACTION</div>
              </div>
              <button onClick={()=>setShowTaskModal(false)} style={{background:"rgba(255,255,255,0.05)",border:"none",color:"#505070",cursor:"pointer",width:28,height:28,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}><X size={14}/></button>
            </div>
            <div style={{padding:"14px 18px 16px",display:"flex",flexDirection:"column",gap:11}}>
              <div>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#383860",letterSpacing:1,marginBottom:5}}>TASK</div>
                <input autoFocus value={newTask.text} onChange={e=>setNewTask({...newTask,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="What needs to be done?"
                  style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"10px 12px",color:"#e0e0f0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div style={{display:"flex",gap:9}}>
                {[["PILLAR","pillar",PILLARS.map(p=>({v:p.id,l:p.name}))],["QUADRANT","quadrant",QUADRANTS.map(q=>({v:q.id,l:q.name}))]].map(([label,key,opts])=>(
                  <div key={key} style={{flex:1}}>
                    <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#383860",letterSpacing:1,marginBottom:5}}>{label}</div>
                    <select value={newTask[key]} onChange={e=>setNewTask({...newTask,[key]:e.target.value})}
                      style={{width:"100%",background:"#111126",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"9px 10px",color:"#e0e0f0",fontSize:12,outline:"none",cursor:"pointer"}}>
                      {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                    </select>
                  </div>
                ))}
              </div>
              <button onClick={addTask} style={{background:PILLARS.find(p=>p.id===newTask.pillar)?.color||"#4d9eff",border:"none",borderRadius:9,padding:"11px 16px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,color:"#000"}}>
                <Plus size={14} strokeWidth={2.5}/> Add Task
              </button>
              <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:8,color:"#1e1e35",textAlign:"center",margin:0}}>Press Enter ↵ to quickly add</p>
            </div>
          </div>
        </div>
      )}

      {/* NOTE EDITOR */}
      {showNoteEditor&&(
        <NoteEditor note={editingNote==="new"?null:editingNote} onSave={saveNote} onClose={()=>{setShowNoteEditor(false);setEditingNote(null);}} isMobile={isMobile}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
